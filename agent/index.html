          <svg class="theme-icon theme-icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>

  <main>
    <section class="page-content">
      <div class="section-header anim-reveal" style="--delay: 0.1s">
        <span class="prompt-char">$</span>
        <span class="section-cmd">cat ./agent.md</span>
        <span class="section-line"></span>
      </div>
      <div class="agent-raw anim-reveal" style="--delay: 0.2s">
        <div class="agent-raw-header">
          <span class="agent-raw-label">agent.md</span>
          <button class="agent-copy-btn" id="copyBtn" aria-label="Copy markdown">copy</button>
        </div>
        <pre class="agent-raw-pre" id="agentRaw"><code id="agentContent">Loading...</code></pre>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2026 Parag Salgaonkar</p>
      <p class="footer-made">// engineered for reliability</p>
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
    (function () {
      const content = document.getElementById('agentContent');
      const copyBtn = document.getElementById('copyBtn');
      let rawMd = '';

      fetch('agent.md')
        .then(r => r.ok ? r.text() : Promise.reject('Not found'))
        .then(md => {
          rawMd = md;
          content.textContent = md;
        })
        .catch(() => { content.textContent = 'Could not load content.'; });

      copyBtn.addEventListener('click', function () {
        navigator.clipboard.writeText(rawMd).then(function () {
          copyBtn.textContent = 'copied!';
          setTimeout(function () { copyBtn.textContent = 'copy'; }, 2000);
        });
      });
    })();
  </script>
